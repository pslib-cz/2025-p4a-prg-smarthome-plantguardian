esphome:
  name: plant-guardian
  friendly_name: plant_guardian

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "2JEgaLHhK/f1NF3o1NlOykkbw+zacbmNKXgO+AWT72A="

ota:
  - platform: esphome
    password: "361689c47881991c53069c91fce27a75"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #use_address: 192.168.1.225

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Plant-Guardian Fallback Hotspot"
    password: "AUJMOY3vA7lV"

captive_portal:

sensor:
  - platform: dht
    pin: 4
    model: DHT22
    temperature:
      name: "Teplota v boxu"
    humidity:
      name: "Vlhkost v boxu"
    update_interval: 10s

  - platform: rotary_encoder
    name: "Nastaveni Teploty (Kroky)"
    pin_a:
      number: 18
      mode:
        input: true
        pullup: true
    pin_b:
      number: 19
      mode:
        input: true
        pullup: true
  
binary_sensor:
  # 1. Tilt Switch (Náklon / Převrácení)
  - platform: gpio
    pin:
      number: 21
      mode:
        input: true
        pullup: true
    name: "Tilt detekce"
    device_class: vibration

  # 2. KY-025 Reed Switch (Otevření víka)
  - platform: gpio
    pin:
      number: 22
      mode:
        input: true
        pullup: true
    name: "Víko boxu"
    device_class: door

  # 3. Flame Sensor (Detekce ohně)
  - platform: gpio
    pin:
      number: 25
      mode:
        input: true
        # Flame senzor často pullup nepotřebuje (má ho na modulu), ale ničemu nevadí
    name: "Detekce plamene"
    device_class: smoke

  # 4. Light Blocking (Senzor osvětlení)
  - platform: gpio
    pin:
      number: 26
      mode:
        input: true
        pullup: true
    name: "Senzor světla"
    device_class: light

# Zmáčknutí rotačního enkodéru
  - platform: gpio
    pin:
      number: 23
      mode:
        input: true
        pullup: true
    name: "Enkoder Tlacitko"

  # Samostatné tlačítko Override
  - platform: gpio
    pin:
      number: 16
      mode:
        input: true
        pullup: true
    name: "Override Tlacitko"

# Definice PWM výstupů
output:
  - platform: ledc
    pin: 27
    id: buzzer_pwm
  - platform: ledc
    pin: 14
    id: servo_pwm
    frequency: 50Hz
  - platform: ledc
    pin: 13
    id: fan_pwm
    frequency: 25000Hz # Vysoká frekvence, aby PC větrák nepískal
    inverted: true     # KRITICKÉ - opravuje otočenou logiku tranzistoru

# Nastavení bzučáku (pro přehrávání melodií)
rtttl:
  output: buzzer_pwm

# Nastavení serva
servo:
  - id: my_servo
    output: servo_pwm

# Přidání ovládacích prvků do Home Assistanta
button:
  - platform: template
    name: "Test Alarmu"
    on_press:
      - rtttl.play: "MissionImp:d=16,o=6,b=95:32d,32d#,32d,32d#,32d,32d#,32d,32d#,32d,32d,32d#,32e,32f,32f#,32g,g"

number:
  - platform: template
    name: "Ovladani Klapky"
    min_value: -100
    max_value: 100
    step: 1
    optimistic: true
    set_action:
      then:
        - servo.write:
            id: my_servo
            level: !lambda 'return x / 100.0;'

switch:
  - platform: gpio
    pin: 32
    name: "Osvětlení Boxu"
    id: relay_light

fan:
  - platform: speed
    output: fan_pwm
    name: "Odsavaci Vetrak"